server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Static assets ──────────────────────────────────
    location ~* \.(css|js|ico|png|jpg|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ── SPA fallback ───────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # ── API proxy → dndapi.fromtheb.ee ─────────────────
    # /api/entities → https://dndapi.fromtheb.ee/api/entities
    location /api/ {
        proxy_pass          https://dndapi.fromtheb.ee/api/;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;

        proxy_set_header    Host       dndapi.fromtheb.ee;
        proxy_set_header    Connection "";
        proxy_set_header    X-Real-IP  $remote_addr;

        # nginx gestisce correttamente gzip end-to-end, nessun hack necessario
    }

    # ── Image proxy → dndapi.fromtheb.ee ───────────────
    # ^~ : evita che la regex degli asset statici (sopra) intercetti
    # le immagini con estensione png/jpg/svg prima di questo blocco
    location ^~ /img/ {
        proxy_pass          https://dndapi.fromtheb.ee/img/;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;

        proxy_set_header    Host       dndapi.fromtheb.ee;
        proxy_set_header    Connection "";
        proxy_set_header    X-Real-IP  $remote_addr;
    }
}
